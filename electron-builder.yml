appId: com.cloudlyric.app
productName: CloudLyric
directories:
  output: release
  buildResources: assets
files:
  - dist/**/*
  - "!node_modules/**/*"
win:
  target:
    - nsis
    - portable
  icon: assets/icons/icon.ico
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
